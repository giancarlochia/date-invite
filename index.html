<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const buttonArea = document.getElementById("buttonArea");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const maxX = buttonArea.clientWidth - 100;
    const maxY = buttonArea.clientHeight - 50;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

yesBtn.addEventListener("click", () => {
    document.getElementById("formSection").style.display = "block";
    buttonArea.style.display = "none";
});

async function submitDate() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const food = document.getElementById("food").value;

    if (!date || !time || !food) {
        alert("Please choose a date, time and food!");
        return;
    }

    await fetch("https://formsubmit.co/ajax/giancarlo246@gmail.com", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            Date: date,
            Time: time,
            Food: food,
            Message: "She said YES ❤️"
        })
    });

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        `❤️ Date confirmed!<br><br>
        📅 ${date}<br>
        ⏰ ${time}<br>
        🍽️ ${food}`;
}
</script>

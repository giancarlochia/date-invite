<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
    width: 400px;
    position: relative;
}

h1 {
    color: #ff4d6d;
}

.buttons {
    margin-top: 20px;
    position: relative;
    height: 120px;
}

button {
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #ff4d6d;
    color: white;
    position: absolute;
    left: 220px;
    top: 0;
}

#formSection {
    display: none;
    margin-top: 20px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#result {
    display: none;
    margin-top: 20px;
    color: #4CAF50;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Will You Go On A Date With Me? ❤️</h1>

    <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes 😍</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div id="formSection">
        <h2>Awesome! 🎉</h2>

        <input type="date" id="date">

        <input type="time" id="time">

        <select id="food">
            <option value="">Choose your favorite food</option>
            <option>Italian 🍝</option>
            <option>Mexican 🌮</option>
            <option>Japanese 🍣</option>
            <option>Steak 🥩</option>
            <option>Burgers 🍔</option>
            <option>Pizza 🍕</option>
        </select>

        <button onclick="submitDate()">Submit ❤️</button>
    </div>

    <div id="result"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const buttonArea = document.getElementById("buttonArea");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const maxX = buttonArea.clientWidth - 100;
    const maxY = buttonArea.clientHeight - 50;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

yesBtn.addEventListener("click", () => {
    document.getElementById("formSection").style.display = "block";
    buttonArea.style.display = "none";
});

function submitDate() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const food = document.getElementById("food").value;

    if (!date || !time || !food) {
        alert("Please choose a date, time and food!");
        return;
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        `❤️ Date confirmed! <br><br>
        📅 ${date}<br>
        ⏰ ${time}<br>
        🍽️ ${food}`;
}
</script>

</body>
</html>
